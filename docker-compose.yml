# Flipo5 backend – run on Hetzner (or local) with: docker compose up -d
# Requires .env (DATABASE_URL, REPLICATE_API_TOKEN, SUPABASE_*, etc.). REDIS_URL is set automatically to redis service.

services:
  redis:
    image: redis:7-alpine
    container_name: flipo5-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

  vectorizer:
    build:
      context: ./services/vectorizer
      dockerfile: Dockerfile
    image: flipo5-vectorizer:latest
    container_name: flipo5-vectorizer
    restart: unless-stopped
    # not exposed publicly; only reachable on the internal docker network
    expose:
      - "8081"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: flipo5-api:latest
    container_name: flipo5-api
    restart: unless-stopped
    depends_on:
      - redis
      - vectorizer
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - PORT=8080
      - REDIS_URL=redis://redis:6379
      - VECTORIZER_URL=http://vectorizer:8081

volumes:
  redis_data:
